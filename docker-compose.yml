services: # * SERVICIOS QUE TENDRA LA APLICACION

  # !CONTENEDOR DE BASE DE DATOS MONGO (db-product-service)
  mongodb:
    image: mongo:7.0.4
    container_name: mongoDBContainer
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db

  # ! CONTENEDOR DE BASE DE DATOS MYSQL (db-inventory-service)
  inventorydb:
    image: mysql:8
    container_name: mySQLDBContainer
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: admin
    volumes:
      - mysql_data:/var/lib/mysql

  # ! CONTENEDOR DE BASE DE DATOS POSTGRES (db-order-service)
  orderdb:
    image: postgres:16-alpine
    container_name: postgreSQLContainer
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: order_db
    volumes:
      - postgresql_data:/var/lib/postgresql/data

  # ! CONTENEDOR DE BASE DE DATOS DE KEYCLOACK (POSTGRESS)
  keycloak_db:
    image: postgres:16-alpine
    container_name: postgreSQLContainer_KeyCloak
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: password
      POSTGRES_DB: keycloak_db
    volumes:
      - postgresql_keycloak_data:/var/lib/postgresql/data

  # ! CONTENEDOR DE KEYCLOACK (AUTENTICACION Y AUTORIZACION)
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: keycloakContainer
    command: start-dev # * Modo desarrollador (rápido y sin https)
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak_db
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: password
      # * Credenciales de usuario administrador
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    depends_on:
      - keycloak_db

#  product-service: # ! CONTENEDOR DE MS DE SPRING BOOT (product-service)
#    build: . # * Usa el Dockerfile de la carpeta actual
#    container_name: productServiceContainer
#    ports:
#      - "8080:8080"
