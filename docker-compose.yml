services: # * SERVICIOS QUE TENDRA LA APLICACION

  mongodb: # !CONTENEDOR DE BASE DE DATOS MONGO (db-product-service)
    image: mongo:7.0.4
    container_name: mongoDBContainer
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db

  inventorydb: # ! CONTENEDOR DE BASE DE DATOS MYSQL (db-inventory-service)
    image: mysql:8
    container_name: mySQLDBContainer
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: admin
    volumes:
      - mysql_data:/var/lib/mysql

  orderdb: # ! CONTENEDOR DE BASE DE DATOS POSTGRES (db-order-service)
    image: postgres:16-alpine
    container_name: postgreSQLContainer
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: order_db
    volumes:
      - postgresql_data:/var/lib/postgresql/data

