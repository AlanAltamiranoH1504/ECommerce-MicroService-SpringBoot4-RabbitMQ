services: # * SERVICIOS QUE TENDRA LA APLICACION

  mongodb: # !CONTENEDOR DE BASE DE DATOS MONGO
    image: mongo:7.0.4
    container_name: mongoDBContainer
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    volumes:
      - mongo_data:/data/db

  product-service: # ! CONTENEDOR DE MS DE SPRING BOOT (product-service)
    build: . # * Usa el Dockerfile de la carpeta actual
    container_name: productServiceContainer
    ports:
      - "8080:8080"
    environment:
      # * Sobrescribimos la config de Spring para usar Docker
      # * Fíjate: usamos 'mongodb' en lugar de 'localhost'
      - SPRING_DATA_MONGODB_URI=mongodb://root:password@mongodb:27018/product-db?authSource=admin
    depends_on:
      - mongodb
volumes:
  mongo_data:
