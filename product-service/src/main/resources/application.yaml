spring:
  application:
    name: product-service
  config: # ! LECTURA DE CONFIGURACIONES DESDE CONFIG SERVER
    import: "optional:configserver:http://localhost:8888"
eureka: # ! CONFIGURACION PARA EUREKA DISCOVERY CLIENT
