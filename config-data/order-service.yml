spring:
#  application:
#    name: order-service
  datasource: # * Configuracion de base de datos
    url: jdbc:postgresql://localhost:5433/order_db
    username: root
    password: admin
    driver-class-name: org.postgresql.Driver
  jpa: # * Configuracion de JPA
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  threads: # * Habilitacion hilos virtuales
    virtual:
      enabled: true
  security: # * Configuracion de autenticacion de id de usuarios por keycloak
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/ecommerce-realm
order: # * Configuracion de actuator
  enabled: true
management:
  endpoints:
    web:
      exposure:
        include: "refresh, health"
server:
  port: 0
