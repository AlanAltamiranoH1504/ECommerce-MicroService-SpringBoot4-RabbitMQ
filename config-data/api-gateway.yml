# ! CONFIGURACION DE CONEXION CON DISCOVERY SERVER
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true

# ! CONFIGURACION DE KEYCLOAK
security:
  oauth2:
    resourceserver:
      jwt:
        issuer-uri: http://localhost:8080/realms/ecommerce-realm
server:
  port: 9000